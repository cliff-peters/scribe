<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scribe — The DOR Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1e28;--surface:#222733;--surface2:#262d3a;--border:#333a48;
  --blue:#5a9de6;--green:#3ecf7a;--amber:#f0a830;--red:#ef4444;
  --text:#f0f2f5;--muted:#9ca3b4;
  --logo-gradient:linear-gradient(135deg,#4a90d9,#3ecf7a);--logo-text:#0c0f14;
}
body{min-height:100vh;background:var(--bg);font-family:"Mulish",sans-serif;color:var(--text);padding:0 0 80px;}

/* Header */
.hdr{padding:36px 20px 0;width:100%;max-width:580px;margin:0 auto 28px;}
.hdr-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--blue);margin-bottom:10px;}
.hdr-lockup{display:flex;align-items:center;gap:14px;}
.cp-logo{width:44px;height:44px;background:var(--logo-gradient);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:var(--logo-text);flex-shrink:0;letter-spacing:0.02em;}
.hdr-title{font-size:1.9rem;font-weight:800;line-height:1.2;}
.hdr-title span{color:var(--blue);}

/* Content */
.content{max-width:580px;margin:0 auto;padding:0 20px;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:14px;}
.card-title{font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}

/* Fields */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
label{font-size:9px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
input[type=text],textarea{
  background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:"Mulish",sans-serif;font-size:13px;font-weight:600;
  padding:10px 12px;outline:none;width:100%;transition:border-color 0.15s;
}
input[type=text]::placeholder,textarea::placeholder{color:var(--border);}
input[type=text]:focus,textarea:focus{border-color:rgba(90,157,230,0.5);}
textarea{resize:vertical;min-height:90px;line-height:1.65;}

/* Participation options */
.part-group{display:flex;gap:8px;flex-wrap:wrap;}
.part-opt{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:8px;padding:9px 14px;cursor:pointer;
  transition:all 0.15s;user-select:none;
}
.part-opt:hover{border-color:var(--blue);}
.part-opt.on{border-color:var(--blue);background:rgba(90,157,230,0.08);}
.dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:var(--surface);flex-shrink:0;transition:all 0.15s;position:relative;}
.part-opt.on .dot{border-color:var(--blue);background:var(--blue);}
.part-opt.on .dot::after{content:"";position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.part-lbl{font-size:12px;font-weight:700;color:var(--text);}

/* Generate button */
.gen-btn{
  width:100%;padding:14px;
  background:var(--blue);border:none;border-radius:8px;
  color:#fff;font-family:"Mulish",sans-serif;
  font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;margin-bottom:14px;
}
.gen-btn:hover{background:#6aade6;transform:translateY(-1px);}

/* Output */
.out-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:20px 22px;
  display:none;
}
.out-card.show{display:block;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.out-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.out-label{font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
.out-tag{font-size:9px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);background:rgba(62,207,122,0.08);border:1px solid rgba(62,207,122,0.2);padding:4px 10px;border-radius:4px;}
.out-text{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:16px;font-size:13px;font-weight:600;line-height:1.8;
  color:var(--text);margin-bottom:16px;
}
.copy-btn{
  background:transparent;border:1.5px solid var(--blue);
  color:var(--blue);font-family:"Mulish",sans-serif;
  font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
  padding:10px 20px;border-radius:6px;cursor:pointer;transition:all 0.15s;
}
.copy-btn:hover,.copy-btn.copied{background:var(--blue);color:#fff;}

/* Footer */
.footer{text-align:center;padding:24px 16px;display:flex;align-items:center;justify-content:center;gap:8px;border-top:1px solid var(--border);margin-top:8px;}
.footer-logo{width:18px;height:18px;background:var(--logo-gradient);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:var(--logo-text);flex-shrink:0;}
.footer-text{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.04em;}

@media(max-width:600px){
  .hdr{padding:24px 16px 0;}
  .content{padding:0 16px;}
  .hdr-title{font-size:1.5rem;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-eyebrow">The DOR Suite</div>
  <div class="hdr-lockup">
    <div class="cp-logo">CP</div>
    <div class="hdr-title">H&amp;W <span>Scribe</span></div>
  </div>
</div>

<div class="content">

  <div class="card">
    <div class="card-title">Resident Information</div>
    <div class="field">
      <label>Resident First Name</label>
      <input type="text" id="resName" placeholder="e.g. Margaret" autocomplete="off"/>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Overall Participation</div>
    <div class="part-group" id="partGroup">
      <div class="part-opt" data-val="consistent"><div class="dot"></div><span class="part-lbl">Consistent</span></div>
      <div class="part-opt" data-val="good"><div class="dot"></div><span class="part-lbl">Good</span></div>
      <div class="part-opt" data-val="fair"><div class="dot"></div><span class="part-lbl">Fair</span></div>
      <div class="part-opt" data-val="inconsistent"><div class="dot"></div><span class="part-lbl">Inconsistent</span></div>
      <div class="part-opt" data-val="declined"><div class="dot"></div><span class="part-lbl">Frequently Declined</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Monthly Overview</div>
    <div class="field">
      <label>How is the resident doing overall?</label>
      <textarea id="overview" placeholder="e.g. Tolerating activities well, seems more engaged, energy has improved..."></textarea>
    </div>
    <div class="field">
      <label>Notable changes or concerns <span style="color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0;">(optional)</span></label>
      <textarea id="changes" placeholder="e.g. Reported increased fatigue mid-month, missed two sessions due to illness..."></textarea>
    </div>
  </div>

  <button class="gen-btn" id="genBtn">Generate Entry</button>

  <div class="out-card" id="outCard">
    <div class="out-header">
      <span class="out-label">30-Day H&amp;W Entry</span>
      <span class="out-tag">Ready to Paste</span>
    </div>
    <div class="out-text" id="outText"></div>
    <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>
  </div>

</div>

<div class="footer">
  <div class="footer-logo">CP</div>
  <div class="footer-text">Built by Cliff Peters</div>
</div>

<script>
var selectedPart = null;

var phrases = {
  consistent:{
    attend:"has attended Health and Wellness sessions consistently throughout the month",
    tone:"Resident demonstrates reliable engagement with the program and has shown a willingness to participate in scheduled activities."
  },
  good:{
    attend:"has maintained good attendance with Health and Wellness sessions this month",
    tone:"Resident demonstrates positive engagement with the program and participates willingly in scheduled activities."
  },
  fair:{
    attend:"has attended Health and Wellness sessions on a fair basis this month",
    tone:"Resident participates when present, though attendance has been variable at times."
  },
  inconsistent:{
    attend:"has had inconsistent attendance with Health and Wellness sessions this month",
    tone:"Participation has been variable. Staff will continue to encourage engagement and monitor attendance going forward."
  },
  declined:{
    attend:"has frequently declined Health and Wellness sessions this month",
    tone:"Resident has declined participation on multiple occasions. Staff will continue to offer sessions and monitor for changes in willingness to engage."
  }
};

document.querySelectorAll(".part-opt").forEach(function(opt){
  opt.addEventListener("click",function(){
    document.querySelectorAll(".part-opt").forEach(function(o){o.classList.remove("on");});
    opt.classList.add("on");
    selectedPart = opt.getAttribute("data-val");
  });
});

document.getElementById("genBtn").addEventListener("click",function(){
  var name     = document.getElementById("resName").value.trim();
  var overview = document.getElementById("overview").value.trim();
  var changes  = document.getElementById("changes").value.trim();

  if(!name){alert("Please enter the resident name.");return;}
  if(!selectedPart){alert("Please select an overall participation level.");return;}
  if(!overview){alert("Please enter a brief monthly overview.");return;}

  var p = phrases[selectedPart];
  var changesLine = changes ? " Notable changes or concerns: "+changes.replace(/\.+$/,"")+"." : "";
  var entry = "30 Day Health and Wellness Update: "+name+" "+p.attend+". "+p.tone+" Monthly Overview: "+overview.replace(/\.+$/,".")+changesLine;

  document.getElementById("outText").textContent = entry;
  var card = document.getElementById("outCard");
  card.classList.add("show");
  setTimeout(function(){card.scrollIntoView({behavior:"smooth",block:"start"});},50);
});

document.getElementById("copyBtn").addEventListener("click",function(){
  var text = document.getElementById("outText").textContent;
  var btn  = document.getElementById("copyBtn");
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent="Copied ✓";btn.classList.add("copied");
      setTimeout(function(){btn.textContent="Copy to Clipboard";btn.classList.remove("copied");},2200);
    });
  } else {
    var ta=document.createElement("textarea");
    ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand("copy");btn.textContent="Copied ✓";btn.classList.add("copied");
    setTimeout(function(){btn.textContent="Copy to Clipboard";btn.classList.remove("copied");},2200);}catch(e){}
    document.body.removeChild(ta);
  }
});
</script>
</body>
</html>
